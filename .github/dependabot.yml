version: 2

updates:
  # Enable version updates for Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "lbc_m"
    labels:
      - "dependencies"
      - "maven"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Add any dependencies to ignore here if needed
      # - dependency-name: "some-package"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "lbc_m"
    labels:
      - "github-actions"
      - "ci-cd"
    commit-message:
      prefix: "ci"
